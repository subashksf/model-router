# Default routing policy.
#
# provider: mock  → no API key needed, returns fake responses instantly.
#                   Swap to "anthropic" or "openai" when ready for real calls.
#
# Copy this file and rename it <tenant_id>.yaml to create per-tenant overrides.

tiers:
  simple:
    provider: mock
    model: mock-haiku
  moderate:
    provider: mock
    model: mock-sonnet
  complex:
    provider: mock
    model: mock-sonnet
  sensitive:
    provider: mock
    model: mock-opus

overrides: []
  # Uncomment to pin specific features to a tier regardless of classifier output:
  # - match:
  #     feature_tag: autocomplete
  #   tier: simple
  # - match:
  #     feature_tag: legal-review
  #   tier: sensitive
